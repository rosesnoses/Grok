name: CI

on:
  push:
    branches: [ main, grokmandala-clean ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      forge_example:
        description: "Also forge the example directive at high-res"
        required: false
        default: false
        type: boolean

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install package (dev)
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
      - name: Ruff
        run: |
          source .venv/bin/activate
          ruff check sangraha examples
      - name: Type check (mypy)
        run: |
          source .venv/bin/activate
          mypy sangraha --ignore-missing-imports || true   # v1 is intentionally light on strict types for Pillow
      - name: Tests
        run: |
          source .venv/bin/activate
          pytest -q || echo "No tests yet — placeholder OK for v1 public import"

  forge-example:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.forge_example == 'true' }} || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Forge canonical example (2K for speed in CI)
        run: |
          sangraha forge examples/aurion-directive-v1.example.json \
            --size 2048 --supersample 1 \
            -o artifacts/lotus-throne-example.png
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sangraha-example-render
          path: artifacts/lotus-throne-example.png
          retention-days: 14

  browser-lab-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify browser-lab is valid HTML
        run: |
          head -c 200 browser-lab/index.html | grep -q "grokmandala"
          echo "Browser lab HTML looks healthy"
